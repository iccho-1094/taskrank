<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Clipboard body -->
  <rect x="122" y="116" width="268" height="300" rx="20" fill="#ffffff"/>
  <!-- Clipboard clip -->
  <rect x="192" y="94" width="128" height="44" rx="20" fill="#93c5fd"/>
  <!-- Row 1: checked -->
  <rect x="158" y="180" width="38" height="38" rx="8" fill="#3b82f6"/>
  <polyline points="166,199 177,210 193,186" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="216" y="193" width="134" height="12" rx="6" fill="#cbd5e1"/>
  <!-- Row 2: checked -->
  <rect x="158" y="248" width="38" height="38" rx="8" fill="#3b82f6"/>
  <polyline points="166,267 177,278 193,254" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="216" y="261" width="100" height="12" rx="6" fill="#cbd5e1"/>
  <!-- Row 3: unchecked (active) -->
  <rect x="158" y="316" width="38" height="38" rx="8" fill="none" stroke="#3b82f6" stroke-width="5"/>
  <rect x="216" y="329" width="144" height="12" rx="6" fill="#1e293b"/>
  <!-- A rank badge -->
  <circle cx="368" cy="132" r="54" fill="#ef4444"/>
  <circle cx="368" cy="132" r="54" fill="none" stroke="#ffffff" stroke-width="8"/>
  <text x="368" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="64" font-weight="bold" fill="#ffffff">A</text>
</svg>
