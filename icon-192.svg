<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Clipboard body -->
  <rect x="46" y="44" width="100" height="112" rx="8" fill="#ffffff"/>
  <!-- Clipboard clip -->
  <rect x="72" y="36" width="48" height="16" rx="8" fill="#93c5fd"/>
  <!-- Row 1: checked -->
  <rect x="60" y="68" width="14" height="14" rx="3" fill="#3b82f6"/>
  <polyline points="63,75 67,79 73,70" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="82" y="73" width="50" height="4" rx="2" fill="#cbd5e1"/>
  <!-- Row 2: checked -->
  <rect x="60" y="94" width="14" height="14" rx="3" fill="#3b82f6"/>
  <polyline points="63,101 67,105 73,96" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="82" y="99" width="38" height="4" rx="2" fill="#cbd5e1"/>
  <!-- Row 3: unchecked (active) -->
  <rect x="60" y="120" width="14" height="14" rx="3" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <rect x="82" y="125" width="54" height="4" rx="2" fill="#1e293b"/>
  <!-- A rank badge -->
  <circle cx="138" cy="50" r="20" fill="#ef4444"/>
  <circle cx="138" cy="50" r="20" fill="none" stroke="#ffffff" stroke-width="3"/>
  <text x="138" y="57" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#ffffff">A</text>
</svg>
